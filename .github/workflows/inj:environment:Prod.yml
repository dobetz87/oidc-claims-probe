name: inj
on: workflow_dispatch
permissions: { id-token: write, contents: read }
jobs:
  m:
    runs-on: ubuntu-latest
    steps:
      - run: |
          T=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=inj")
          echo "$T" | python3 -c "import sys,json,base64;v=json.load(sys.stdin)['value'].split('.')[1];v+='='*(-len(v)%4);c=json.loads(base64.urlsafe_b64decode(v));print('SUB='+c.get('sub',''));print('JWR='+str(c.get('job_workflow_ref')))"
