name: reusable-pub
on: workflow_call
permissions:
  id-token: write
  contents: read
jobs:
  pub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with: { node-version: '22', registry-url: 'https://registry.npmjs.org' }
      - run: npm install -g npm@latest
      - name: ACTUAL publish in reusable-pub.yml (npm trusts publish.yml, the caller)
        run: |
          mkdir -p /tmp/p
          printf '{"name":"@dobetz/tp-probe","version":"0.1.%s","license":"MIT","repository":{"type":"git","url":"git+https://github.com/dobetz87/oidc-claims-probe.git"}}\n' "${{ github.run_id }}" > /tmp/p/package.json
          echo "module.exports={};" > /tmp/p/index.js
          npm publish /tmp/p --access public 2>&1 | tail -18
