name: oidc-enc
on: workflow_dispatch
permissions:
  id-token: write
jobs:
  probe:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env: ["p:q", "p%3Aq", "p%3aq", "p/q", "p%2Fq"]
    environment: ${{ matrix.env }}
    steps:
      - run: |
          S=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=x" | python3 -c "import sys,json,base64;t=json.load(sys.stdin)['value'].split('.')[1];t+='='*(-len(t)%4);print(json.loads(base64.urlsafe_b64decode(t))['sub'])")
          echo "OIDCMARK || $S"
