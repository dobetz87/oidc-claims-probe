name: publish2
on: workflow_dispatch
permissions:
  id-token: write
  contents: read
jobs:
  pub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with: { node-version: '22', registry-url: 'https://registry.npmjs.org' }
      - run: npm install -g npm@latest
      - name: publish from a DIFFERENT workflow filename (publish2.yml) — should REJECT if filename enforced
        run: |
          mkdir -p /tmp/p
          echo '{"name":"@dobetz/tp-probe","version":"0.1.${{ github.run_id }}","license":"MIT"}' > /tmp/p/package.json
          echo "module.exports={};" > /tmp/p/index.js
          npm publish /tmp/p --access public 2>&1 | tail -25
