name: jwrprobe
on: push
permissions:
  id-token: write
jobs:
  mint:
    runs-on: ubuntu-latest
    steps:
      - run: |
          T=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=jwr" | python3 -c "import sys,json,base64;t=json.load(sys.stdin)['value'].split('.')[1];t+='='*(-len(t)%4);d=json.loads(base64.urlsafe_b64decode(t));print('SUB='+d['sub']);print('JWR='+d.get('job_workflow_ref',''));print('WFR='+d.get('workflow_ref',''));print('WF='+d.get('workflow',''))")
          echo "$T"