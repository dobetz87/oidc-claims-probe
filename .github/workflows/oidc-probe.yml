name: oidc-probe
on:
  push:
    paths-ignore: ['claims.json']
  workflow_dispatch:
permissions:
  id-token: write
  contents: write
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: mint + decode OIDC
        run: |
          RESP=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=github-oidc-probe")
          JWT=$(echo "$RESP" | python3 -c "import sys,json;print(json.load(sys.stdin)['value'])")
          echo "$JWT" | cut -d. -f2 | python3 -c "import sys,base64,json;p=sys.stdin.read().strip();p+='='*(-len(p)%4);print(json.dumps(json.loads(base64.urlsafe_b64decode(p)),indent=2))" | tee claims.json
      - name: commit claims back
        run: |
          git config user.name gh-actions
          git config user.email actions@users.noreply.github.com
          git add claims.json
          git commit -m "record oidc claims [skip ci]" || echo nochange
          git push
