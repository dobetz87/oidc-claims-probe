name: deep
on: workflow_dispatch
permissions: {}
jobs:
  x:
    runs-on: ubuntu-latest
    steps:
      - name: deep local recon (safe, own VM)
        run: |
          TOK=$(python3 -c "import json;print(json.load(open('/opt/hca/.settings'))['authToken'])")
          echo "=== authToken HEADER ==="
          echo "$TOK" | cut -d. -f1 | python3 -c "import sys,base64,json;p=sys.stdin.read().strip();p+='='*(-len(p)%4);print(json.dumps(json.loads(base64.urlsafe_b64decode(p))))"
          echo "=== authToken ALL CLAIMS (worker-bound or fleet-wide? lifetime?) ==="
          echo "$TOK" | cut -d. -f2 | python3 -c "import sys,base64,json,datetime;p=sys.stdin.read().strip();p+='='*(-len(p)%4);d=json.loads(base64.urlsafe_b64decode(p));[print(f'  {k}: {v}') for k,v in sorted(d.items())]"
          echo "=== agent LOG: real operations + endpoints + how token is used ==="
          cat /opt/hca/logs/hosted-compute-agent.log 2>/dev/null | grep -iaE "http|POST |GET |PUT |PATCH|/v1|orchestrat|schedul|trace|worker|job|attest|error|unauthor|allocat|deallocat|status|endpoint" | head -45
          echo "=== binary: API paths + operation verbs the token unlocks ==="
          strings -n 6 /opt/hca/hosted-compute-agent 2>/dev/null | grep -aE "(^|\")/v1(/|\"|$)|/vm/v1|/v1/[a-z]|scheduler|orchestrator|X-[A-Za-z-]*Attestation|allocate|deallocate|reportJob|report-job|acquireJob|completeJob|worker/|/workers|attestation-provider" | sort -u | head -60
