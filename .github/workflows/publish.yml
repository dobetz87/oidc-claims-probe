name: publish
on:
  workflow_dispatch:
    inputs:
      envname:
        description: "env to publish under; 'none' = NO environment claim (downgrade test)"
        required: true
        default: "p:q"
permissions:
  id-token: write
  contents: read
jobs:
  pub_env:
    if: ${{ inputs.envname != 'none' }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.envname }}
    permissions: { id-token: write, contents: read }
    steps:
      - uses: actions/setup-node@v4
        with: { node-version: '22', registry-url: 'https://registry.npmjs.org' }
      - run: npm install -g npm@latest
      - name: mint + publish (WITH environment)
        run: |
          T=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=npm")
          echo "$T" | python3 -c "import sys,json,base64;v=json.load(sys.stdin)['value'].split('.')[1];v+='='*(-len(v)%4);c=json.loads(base64.urlsafe_b64decode(v));print('sub=',c.get('sub'));print('environment=',repr(c.get('environment')))"
          mkdir -p /tmp/p
          printf '{"name":"@dobetz/tp-probe","version":"0.3.%s","license":"MIT","repository":{"type":"git","url":"git+https://github.com/dobetz87/oidc-claims-probe.git"}}\n' "${{ github.run_id }}" > /tmp/p/package.json
          echo "module.exports={};" > /tmp/p/index.js
          npm publish /tmp/p --access public 2>&1 | tail -20
  pub_noenv:
    if: ${{ inputs.envname == 'none' }}
    runs-on: ubuntu-latest
    permissions: { id-token: write, contents: read }
    steps:
      - uses: actions/setup-node@v4
        with: { node-version: '22', registry-url: 'https://registry.npmjs.org' }
      - run: npm install -g npm@latest
      - name: mint + publish (NO environment claim) vs env-PINNED publisher = DOWNGRADE TEST
        run: |
          T=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=npm")
          echo "$T" | python3 -c "import sys,json,base64;v=json.load(sys.stdin)['value'].split('.')[1];v+='='*(-len(v)%4);c=json.loads(base64.urlsafe_b64decode(v));print('sub=',c.get('sub'));print('environment=',repr(c.get('environment')),'(expect None/absent)')"
          mkdir -p /tmp/p
          printf '{"name":"@dobetz/tp-probe","version":"0.3.%s","license":"MIT","repository":{"type":"git","url":"git+https://github.com/dobetz87/oidc-claims-probe.git"}}\n' "${{ github.run_id }}" > /tmp/p/package.json
          echo "module.exports={};" > /tmp/p/index.js
          echo "=== publishing NO-ENV token against env-pinned (p:q) trusted publisher ==="
          npm publish /tmp/p --access public 2>&1 | tail -20
