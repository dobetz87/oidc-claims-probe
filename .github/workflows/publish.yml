name: publish
on: workflow_dispatch
permissions:
  id-token: write
  contents: read
jobs:
  pub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - name: ensure npm supports trusted publishing
        run: npm install -g npm@latest && npm --version
      - name: publish @dobetz/tp-probe via TRUSTED PUBLISHING (OIDC, no token)
        run: |
          mkdir -p /tmp/p
          cat > /tmp/p/package.json <<EOF
          {"name":"@dobetz/tp-probe","version":"0.1.${{ github.run_number }}","description":"tp research","license":"MIT","repository":"github:dobetz87/oidc-claims-probe"}
          EOF
          echo "module.exports={};" > /tmp/p/index.js
          echo "# tp" > /tmp/p/README.md
          echo "--- env: no NODE_AUTH_TOKEN set -> forces OIDC trusted publishing ---"
          npm publish /tmp/p --access public 2>&1 | tail -30
