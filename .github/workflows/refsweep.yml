name: refsweep
on: push
permissions:
  id-token: write
jobs:
  mint:
    runs-on: ubuntu-latest
    steps:
      - run: |
          T=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=refsweep" | python3 -c "import sys,json,base64;t=json.load(sys.stdin)['value'].split('.')[1];t+='='*(-len(t)%4);d=json.loads(base64.urlsafe_b64decode(t));print('SUBCLAIM='+d['sub']);print('REFCLAIM='+d.get('ref',''))")
          echo "$T"