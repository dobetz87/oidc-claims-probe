name: p5
on: workflow_dispatch
permissions: {}
jobs:
  x:
    runs-on: ubuntu-latest
    steps:
      - name: P5 scope + auth-flip (self-scoped, read-only)
        run: |
          TOK=$(python3 -c "import json;print(json.load(open('/opt/hca/.settings'))['authToken'])")
          echo "authToken length: ${#TOK}  dots: $(echo -n "$TOK" | tr -cd '.' | wc -c)"
          echo "=== decode token scope (aud/sub/scope) if JWT ==="
          echo "$TOK" | cut -d. -f2 | python3 -c "import sys,base64,json;p=sys.stdin.read().strip();p+='='*(-len(p)%4);d=json.loads(base64.urlsafe_b64decode(p));print(json.dumps({k:d.get(k) for k in ['aud','sub','iss','scope','scp','roles','app_displayname','oid','workerId','worker_id','resource','exp'] if d.get(k) is not None}))" 2>/dev/null || echo "NOT a JWT (opaque token)"
          RO="https://hosted-compute-request-orchestrator-prod-eus-01.githubapp.com"
          echo "=== auth-flip test (GET only, no data endpoints) ==="
          echo -n "no-auth  /vm/v1 -> "; curl -s -o /tmp/a -w "%{http_code}" --max-time 8 "$RO/vm/v1"; echo " :: $(head -c 70 /tmp/a|tr -d '\n')"
          echo -n "Bearer   /vm/v1 -> "; curl -s -o /tmp/b -w "%{http_code}" --max-time 8 -H "Authorization: Bearer $TOK" "$RO/vm/v1"; echo " :: $(head -c 70 /tmp/b|tr -d '\n')"
          echo -n "Bearer   /v1    -> "; curl -s -o /tmp/c -w "%{http_code}" --max-time 8 -H "Authorization: Bearer $TOK" "$RO/v1"; echo " :: $(head -c 70 /tmp/c|tr -d '\n')"
          echo "=== STOP: no enumeration, no mutation ==="
